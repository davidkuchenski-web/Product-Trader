name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ to GitHub Pages.
# After this lands on the default branch, set:
#   Settings -> Pages -> Source: GitHub Actions
# Note: GitHub Pages is static-only, so this build uses bring-your-own-key
# (each visitor pastes their Anthropic key). To run with no key in the browser,
# deploy to Vercel instead (see api/README.md).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
